name: embed_rgd_chat

services:
  app:
    image: ghcr.io/russian-gamedev/embed.rgd.chat:latest
    container_name: "${COMPOSE_PROJECT_NAME}_app"
    ports:
      - "4325:3000"
    env_file: .env
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    container_name: "${COMPOSE_PROJECT_NAME}_redis"
